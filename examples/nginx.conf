# ═══════════════════════════════════════════════════════════════════
# Nginx — пример конфигурации для Xray Balancer Middleware
# ═══════════════════════════════════════════════════════════════════
#
# Схема работы:
#   VPN-клиенты (Happ, Streisand, V2Ray…) → balancer middleware → sub page
#   Браузеры и прочие клиенты              → subscription page напрямую
#
# Замените:
#   YOUR_SUB_DOMAIN         → домен подписки (например sub.example.com)
#   /path/to/fullchain.pem  → путь к SSL-сертификату
#   /path/to/privkey.key    → путь к приватному ключу
# ═══════════════════════════════════════════════════════════════════

# ── Upstreams ─────────────────────────────────────────────────────

upstream remnawave-subscription-page {
    server remnawave-subscription-page:3010;
}

upstream xray_balancer_mw {
    server xray-balancer-mw:4100;
}

# ── Роутинг по User-Agent ─────────────────────────────────────────
# VPN-клиенты получают JSON с балансировкой, остальные — веб-страницу
map $http_user_agent $sub_backend {
    default                       remnawave-subscription-page;
    ~*(?:happ|streisand|v2raytun) xray_balancer_mw;
    ~*(?:v2ray|neko|foxray)       xray_balancer_mw;
    ~*(?:v2box|xray|invisibleman) xray_balancer_mw;
}

# ── Reject unknown SNI ────────────────────────────────────────────
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_reject_handshake on;
}

# ── Subscription ──────────────────────────────────────────────────
server {
    listen 443 ssl reuseport;
    listen [::]:443 ssl reuseport;
    http2 on;

    server_name YOUR_SUB_DOMAIN;

    location / {
        proxy_http_version 1.1;
        proxy_pass         http://$sub_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_pass_request_headers on;
    }

    # SSL
    ssl_certificate         /path/to/fullchain.pem;
    ssl_certificate_key     /path/to/privkey.key;
    ssl_trusted_certificate /path/to/fullchain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;

    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 1.0.0.1 8.8.8.8 8.8.4.4 valid=60s;
    resolver_timeout    2s;

    # Gzip
    gzip       on;
    gzip_vary  on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types application/json text/plain text/css application/javascript;
}
